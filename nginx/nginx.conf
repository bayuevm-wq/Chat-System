# ============================================================
# Nginx Configuration — WebSocket-Aware Reverse Proxy
# ============================================================
# Features:
#   - IP hash sticky sessions for WebSocket affinity
#   - WebSocket upgrade support with long-lived connections
#   - Health check endpoint
#   - Connection keepalive optimization
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ──────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Logging ─────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── WebSocket Upgrade Mapping ───────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Upstream Backend (Sticky Sessions via IP Hash) ──────────
    upstream chat_backend {
        ip_hash;  # Sticky sessions — same client always hits same node
        server chat-server-1:8000 max_fails=3 fail_timeout=30s;
        server chat-server-2:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── Server Block ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── REST API Endpoints ──────────────────────────────────
        location /api/ {
            proxy_pass http://chat_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── WebSocket Endpoint ──────────────────────────────────
        location /ws {
            proxy_pass http://chat_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived connection timeouts (1 hour)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # Disable buffering for real-time
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Prometheus Metrics ──────────────────────────────────
        location /metrics {
            proxy_pass http://chat_backend;
            proxy_set_header Host $host;
        }

        # ── Nginx Health Check ──────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
