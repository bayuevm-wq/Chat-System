# ============================================================
# Docker Compose — Distributed Chat System Full Stack
# ============================================================
# Services:
#   - chat-server-1, chat-server-2: FastAPI application nodes
#   - db: PostgreSQL 16
#   - redis: Redis 7 with AOF persistence
#   - nginx: Load balancer with sticky sessions
# ============================================================

services:
  # ── Chat Server Node 1 ──────────────────────────────────────
  chat-server-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-server-1
    environment:
      - NODE_ID=node-1
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://chatuser:chatpass@db:5432/chatdb
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-change-me-in-production-at-least-32-chars}
      - LOG_LEVEL=INFO
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Chat Server Node 2 ──────────────────────────────────────
  chat-server-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-server-2
    environment:
      - NODE_ID=node-2
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://chatuser:chatpass@db:5432/chatdb
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-change-me-in-production-at-least-32-chars}
      - LOG_LEVEL=INFO
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: chat-postgres
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chat-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Nginx Load Balancer ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - chat-server-1
      - chat-server-2
    networks:
      - chat-network
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Networks ────────────────────────────────────────────────────
networks:
  chat-network:
    driver: bridge
